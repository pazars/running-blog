# Cloudflare Pages config for the view-count backend (Phase 2).
# The static Astro build (dist/) is served as assets; everything under
# functions/ deploys as Pages Functions alongside it. No Astro adapter / SSR.
#
# One-time setup:
#   npx wrangler d1 create personal-blog-views
#   # paste the printed database_id below, then create the table:
#   npx wrangler d1 execute personal-blog-views --remote --file=./schema.sql
#
# Local dev against the functions + a local D1:
#   npm run build && npx wrangler pages dev dist
name = "personal-blog"
compatibility_date = "2026-06-05"
pages_build_output_dir = "dist"

# Consumed by functions/api/views/* as `env.DB`.
# database_id is a non-secret account-scoped identifier — safe to commit (access
# still requires Cloudflare auth). Real secrets/tokens never go here: put them in
# `.dev.vars` (gitignored) for local dev, or `wrangler secret put` / the dashboard.
[[d1_databases]]
binding = "DB"
database_name = "personal-blog-views"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
